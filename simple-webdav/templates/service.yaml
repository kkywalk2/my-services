apiVersion: v1
kind: Service
metadata:
  name: {{ include "simple-webdav.fullname" . }}
  labels:
    {{- include "simple-webdav.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "simple-webdav.selectorLabels" . | nindent 4 }}
