replicaCount: 1

image:
  repository: ghcr.io/kkywalk2/simple-webdav-server
  tag: latest
  pullPolicy: Always

imagePullSecrets: []

service:
  port: 8080

env:
  WEBDAV_ROOT: /data/webdav
  WEBDAV_DB_PATH: /data/webdav.db

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce

ingress:
  enabled: true
  host: cnt2020.hopto.org
  pathPrefix: /webdav

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
